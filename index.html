function bindUploadUsers() {
  const inp = document.getElementById('userFileInput');
  const drop = document.getElementById('userFileDrop');
  const parseBulkBtn = document.getElementById('parseBulkUsersBtn');
  const clearBulkBtn = document.getElementById('clearBulkUsersBtn');
  if (!inp || !drop) return;
  
  drop.onclick = () => inp.click();
  inp.onchange = e => processUsersFile(e.target.files[0]);
  if (parseBulkBtn) parseBulkBtn.onclick = processBulkUsersText;
  if (clearBulkBtn) clearBulkBtn.onclick = () => {
    document.getElementById('bulkUsersText').value = '';
    document.getElementById('userUploadError').innerHTML = '';
    document.getElementById('userPreview').innerHTML = '';
    pendingUserImport = [];
  };
  
  drop.ondragover = e => { e.preventDefault(); drop.style.borderColor='var(--blue-light)'; };
  drop.ondragleave = () => { drop.style.borderColor=''; };
  drop.ondrop = e => { e.preventDefault(); drop.style.borderColor=''; processUsersFile(e.dataTransfer.files[0]); };
}

function processUsersFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const result = parseUsersCsv(e.target.result, {allowHeaderless: true});
      if (result.errors.length > 0) {
        document.getElementById('userUploadError').innerHTML = result.errors.map(err => `<div class="form-error">${err}</div>`).join('');
        return;
      }
      if (result.users.length === 0) {
        document.getElementById('userUploadError').innerHTML = '<div class="form-error">לא נמצאו משתמשים לייבוא בקובץ</div>';
        return;
      }
      document.getElementById('userUploadError').innerHTML = '';
      showUsersPreview(result.users);
    } catch(err) {
      document.getElementById('userUploadError').innerHTML = `<div class="form-error">שגיאה בעיבוד הקובץ: ${err.message}</div>`;
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function processBulkUsersText() {
  const textarea = document.getElementById('bulkUsersText');
  const text = textarea?.value || '';
  if (!text.trim()) {
    document.getElementById('userUploadError').innerHTML = '<div class="form-error">נא להדביק לפחות משתמש אחד</div>';
    return;
  }
  try {
    const result = parseUsersCsv(text, {allowHeaderless: true});
    if (result.errors.length > 0) {
      document.getElementById('userUploadError').innerHTML = result.errors.map(err => `<div class="form-error">${err}</div>`).join('');
      return;
    }
    if (result.users.length === 0) {
      document.getElementById('userUploadError').innerHTML = '<div class="form-error">לא נמצאו משתמשים לייבוא ברשימה</div>';
      return;
    }
    document.getElementById('userUploadError').innerHTML = '';
    showUsersPreview(result.users);
  } catch(err) {
    document.getElementById('userUploadError').innerHTML = `<div class="form-error">שגיאה בעיבוד הרשימה: ${err.message}</div>`;
  }
}

function parseUsersCsv(csvText, options={}) {
  const text = csvText.replace(/\uFEFF/g,'');
  const delimiter = detectCsvDelimiter(text);
  const rows = parseCsvRows(text, delimiter).filter(row => row.some(c => c.trim()));
  if (rows.length < (options.allowHeaderless ? 1 : 2)) return { users: [], errors: ['הקובץ ריק או אין נתונים'] };
  
  const errors = [];
  let header = rows[0].map(cleanCsvHeader);
  let firstDataLine = 1;
  
  const hasNameHeader = header.some(h => compactCsvHeader(h).includes('name') || h.includes('שם'));
  const hasEmailHeader = header.some(h => {
    const compact = compactCsvHeader(h);
    return compact.includes('email') || compact === 'mail' || h.includes('אימייל') || h.includes('מייל');
  });
  if (!hasNameHeader || !hasEmailHeader) {
    if (options.allowHeaderless) {
      header = ['fullname','email','phone','teamname'];
      firstDataLine = 0;
    } else {
      if (!hasNameHeader) errors.push('חסרה עמודת שם');
      if (!hasEmailHeader) errors.push('חסרה עמודת אימייל');
    }
  }
  
  if (errors.length > 0) return { users: [], errors };
  
  const users = [];
  const seenEmails = new Set(), seenPhones = new Set();
  
  for (let i = firstDataLine; i < rows.length; i++) {
    const cols = rows[i];
    if (cols.every(c => !c.trim())) continue;
    
    const obj = {};
    header.forEach((h, idx) => {
      const val = (cols[idx] || '').trim();
      obj[h] = val;
      obj[compactCsvHeader(h)] = val;
    });
    
    const fullName = obj['fullname'] || obj['full_name'] || obj['full name'] || obj['שם מלא'] || obj['שםמלא'] || obj['name'] || obj['שם'] || '';
    const email = normalizeEmail(obj['email'] || obj['emailaddress'] || obj['mail'] || obj['אימייל'] || obj['מייל'] || '');
    const phone = normalizePhone(obj['phone'] || obj['טלפון'] || '');
    const displayName = obj['displayname'] || obj['display_name'] || obj['display name'] || obj['כינוי'] || fullName;
    const teamName = obj['teamname'] || obj['team_name'] || obj['team name'] || obj['team'] || obj['קבוצה'] || obj['שם קבוצה'] || obj['שםקבוצה'] || '';
    const userId = obj['userid'] || obj['user_id'] || obj['user id'] || obj['id'] || ('u' + uid());
    
    if (!fullName) { errors.push(`שורה ${i+1}: חסר שם`); continue; }
    if (!email) { errors.push(`שורה ${i+1}: חסר אימייל`); continue; }
    if (!isValidEmail(email)) { errors.push(`שורה ${i+1}: אימייל לא תקין (${email})`); continue; }
    if (email && seenEmails.has(email)) { errors.push(`נמצאו כפילויות משתמשים: ${email}`); continue; }
    if (phone && seenPhones.has(phone)) { errors.push(`נמצאו כפילויות משתמשים: ${phone}`); continue; }
    
    if (email) seenEmails.add(email);
    if (phone) seenPhones.add(phone);
    
    users.push({id:userId, fullName, displayName, teamName: teamName||'', email, phone, passwordHash:null, passwordSetAt:null, totalScore:0, exactCount:0, outcomeCount:0, bonusScore:0, createdAt:Date.now()});
  }
  
  return { users, errors };
}

function cleanCsvHeader(value) {
  return (value || '').trim().toLowerCase().replace(/^"+|"+$/g, '');
}

function compactCsvHeader(value) {
  return cleanCsvHeader(value).replace(/[\s_-]/g, '');
}

function detectCsvDelimiter(text) {
  const sampleLines = text.replace(/\uFEFF/g,'').split(/\r\n|\n|\r/).filter(l => l.trim()).slice(0, 5);
  const candidates = [',',';','\t','|'];
  let best = ',', bestCount = -1;
  candidates.forEach(delimiter => {
    const count = sampleLines.reduce((sum, line) => sum + countUnquotedDelimiter(line, delimiter), 0);
    if (count > bestCount) { best = delimiter; bestCount = count; }
  });
  return best;
}

function countUnquotedDelimiter(line, delimiter) {
  let count = 0, inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') {
      if (inQuotes && line[i+1] === '"') i++;
      else inQuotes = !inQuotes;
    } else if (line[i] === delimiter && !inQuotes) {
      count++;
    }
  }
  return count;
}

function parseCsvRows(text, delimiter=',') {
  const rows = [];
  let row = [], current = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === delimiter && !inQuotes) {
      row.push(current);
      current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      row.push(current);
      if (row.some(c => c.trim())) rows.push(row);
      row = [];
      current = '';
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      current += ch;
    }
  }
  row.push(current);
  if (row.some(c => c.trim())) rows.push(row);
  return rows;
}

function parseCsvLine(line, delimiter=',') {
  const rows = parseCsvRows(line, delimiter);
  return rows[0] || [];
}

function showUsersPreview(users) {
  const prev = document.getElementById('userPreview');
  if (!prev) return;
  pendingUserImport = users;
  prev.innerHTML = `
    <div style="margin-top:16px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:10px">תצוגה מקדימה — ${users.length} משתמשים</h3>
      <div class="preview-wrapper">
        <table class="preview-table">
          <thead><tr><th>שם מלא</th><th>שם קבוצה</th><th>אימייל</th><th>טלפון</th><th>סיסמה</th></tr></thead>
          <tbody>${users.map(u => `<tr><td>${u.fullName}</td><td>${u.teamName||'-'}</td><td>${u.email||'-'}</td><td>${u.phone||'-'}</td><td>תוגדר בכניסה ראשונה</td></tr>`).join('')}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" onclick="importUsers()">✓ ייבא ${users.length} משתמשים</button>
        <button class="btn btn-secondary" onclick="clearUsersPreview()">ביטול</button>
      </div>
    </div>`;
}

window.clearUsersPreview = function() {
  pendingUserImport = [];
  const prev = document.getElementById('userPreview');
  if (prev) prev.innerHTML = '';
};

window.importUsers = async function(users=pendingUserImport) {
  if (!users || users.length === 0) { showToast('אין משתמשים לייבוא'); return; }
  let existing = loadData('users', []);
  let added = 0, skipped = 0;
  const importedEmails = [];
  users.forEach(u => {
    const email = normalizeEmail(u.email);
    const phone = normalizePhone(u.phone);
    const dup = existing.find(e => (email && normalizeEmail(e.email)===email)||(phone && phonesMatch(e.phone, phone)));
    if (dup) { skipped++; return; }
    existing.push({...u, email, phone, passwordHash:null, passwordSetAt:null, createdAt:u.createdAt || Date.now()});
    importedEmails.push(email);
    added++;
  });
  if (!saveData('users', existing, {skipCloud:true})) {
    showToast('שגיאה בשמירת המשתמשים. נסה שוב או בדוק שהדפדפן מאפשר שמירה מקומית.', 4200);
    return;
  }
  const cloudSaved = await saveUsersToCloud(existing);
  const savedUsers = loadData('users', []);
  const missingAfterSave = importedEmails.filter(email => !savedUsers.some(u => normalizeEmail(u.email) === email));
  if (missingAfterSave.length > 0) {
    showToast('השמירה לא הושלמה לכל המשתמשים. נסה שוב.', 4200);
    return;
  }
  pendingUserImport = [];
  const cloudNote = shouldUseCloudUsers() ? (cloudSaved ? ' ונשמרו במערכת' : ' ונשמרו בדפדפן הזה. הסנכרון המרכזי לא זמין כרגע') : '';
  showToast(`✅ יובאו ${added} משתמשים${skipped>0?`, דולגו ${skipped} כפולים`:''}${cloudNote}`, cloudSaved ? 2600 : 4800);
  switchAdminPanel('users');
};

  return `
    <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">📤 העלאת משחקים</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">
      העלה קובץ CSV עם עמודות: תאריך, שעה, המשחק (קבוצה א - קבוצה ב), עיר מארחת
    </p>
    
    <label class="file-drop" id="matchFileDrop" style="cursor:pointer;display:block">
      <input type="file" accept=".csv" id="matchFileInput" style="display:none">
      <div class="file-drop-icon">📁</div>
      <div class="file-drop-text">לחץ לבחירת קובץ CSV</div>
      <div class="file-drop-hint">פורמט: תאריך,שעה,המשחק,עיר מארחת</div>
    </label>
    
    <div id="matchUploadError"></div>
    <div id="matchPreview"></div>`;

function bindUploadMatches() {
  const inp = document.getElementById('matchFileInput');
  const drop = document.getElementById('matchFileDrop');
  if (!inp || !drop) return;
  
  drop.onclick = () => inp.click();
  inp.onchange = e => processMatchesFile(e.target.files[0]);
  drop.ondragover = e => { e.preventDefault(); };
  drop.ondrop = e => { e.preventDefault(); processMatchesFile(e.dataTransfer.files[0]); };
}

function processMatchesFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const result = parseMatchesCsv(e.target.result);
      if (result.errors.length > 0) {
        document.getElementById('matchUploadError').innerHTML = result.errors.map(err => `<div class="form-error">${err}</div>`).join('');
        return;
      }
      document.getElementById('matchUploadError').innerHTML = '';
      showMatchesPreview(result.matches);
    } catch(err) {
      document.getElementById('matchUploadError').innerHTML = `<div class="form-error">שגיאה בעיבוד הקובץ: ${err.message}</div>`;
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function parseMatchesCsv(csvText) {
  const lines = csvText.replace(/\uFEFF/,'').split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { matches: [], errors: ['לא נמצאו משחקים בקובץ'] };
  
  const matches = [];
  const errors = [];
  
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCsvLine(lines[i]);
    if (cols.every(c => !c.trim())) continue;
    const date = cols[0]?.trim();
    const time = cols[1]?.trim();
    const game = cols[2]?.trim().replace(/"/g,'');
    const city = cols[3]?.trim();
    
    if (!date || !game) continue;
    if (!date.includes('.')) { errors.push(`שורה ${i+1}: פורמט תאריך לא תקין: ${date}`); continue; }
    
    // Split game into teams - handle both - and –
    const sep = game.includes(' – ') ? ' – ' : game.includes(' - ') ? ' - ' : ' - ';
    const parts = game.split(sep);
    if (parts.length < 2) { errors.push(`שורה ${i+1}: לא ניתן לפרק את המשחק: ${game}`); continue; }
    
    const homeTeam = parts[0].trim();
    const awayTeam = parts.slice(1).join(sep).trim();
    
    const [day, month] = date.split('.');
    const [hh, mm] = (time||'00:00').split(':');
    const startsAt = new Date(2026, parseInt(month)-1, parseInt(day), parseInt(hh)||0, parseInt(mm)||0).getTime();
    
    matches.push({id:'match_'+uid(), stage:'group', date, time: time||'', startsAt,
      homeTeam, awayTeam, hostCity: city||'', status:'open',
      actualHomeScore:null, actualAwayScore:null, actualWinner:null, advancingTeam:null});
  }
  
  if (matches.length === 0 && errors.length === 0) errors.push('לא נמצאו משחקים בקובץ');
  
  return { matches, errors };
}

function showMatchesPreview(matches) {
  const prev = document.getElementById('matchPreview');
  if (!prev) return;
  prev.innerHTML = `
    <div style="margin-top:16px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:10px">תצוגה מקדימה — ${matches.length} משחקים</h3>
      <div class="preview-wrapper">
        <table class="preview-table">
          <thead><tr><th>תאריך</th><th>שעה</th><th>בית</th><th>חוץ</th><th>עיר</th></tr></thead>
          <tbody>${matches.map(m => `<tr><td>${m.date}</td><td>${m.time}</td><td>${m.homeTeam}</td><td>${m.awayTeam}</td><td>${m.hostCity}</td></tr>`).join('')}</tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" onclick='importMatches(${JSON.stringify(matches).replace(/'/g,"&#39;")})'>✓ ייבא ${matches.length} משחקים</button>
        <button class="btn btn-secondary" onclick="document.getElementById('matchPreview').innerHTML=''">ביטול</button>
      </div>
    </div>`;
}

window.importMatches = function(matches) {
  const existing = loadData('matches', []);
  const merged = [...existing, ...matches];
  saveData('matches', merged);
  showToast(`✅ יובאו ${matches.length} משחקים`);
  switchAdminPanel('matches');
};
