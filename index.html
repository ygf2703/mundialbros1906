<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אחים מנחשים מונדיאל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0D2451;--blue-light:#1A4A8A;--blue-pale:#D6E4FF;
  --yellow:#F5C518;--yellow-dark:#D4A017;--yellow-pale:#FFFBE6;
  --white:#FFFFFF;--bg:#F0F4FF;--card:#FFFFFF;
  --text:#0D1B3E;--text2:#2D4A7A;--text3:#7A90B8;
  --border:#C5D5F0;--success:#10B981;--danger:#334155;--warn:#F5C518;
  --shadow:0 2px 12px rgba(13,36,81,0.15);
  --radius:12px;--radius-sm:8px;
}

/* Logo SVG inline */
.logo-img{width:44px;height:44px;display:block}
body{font-family:'Heebo',sans-serif;background:#040D1F;color:var(--text);min-height:100vh;direction:rtl;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:url("assets/login-fans-bg.png") center/cover no-repeat;opacity:.16;animation:appBgOpacity 12s ease-in-out infinite;pointer-events:none;z-index:0}
body::after{content:"";position:fixed;inset:0;background:linear-gradient(160deg,rgba(4,13,31,.68) 0%,rgba(245,197,24,.26) 42%,rgba(255,251,230,.9) 100%);pointer-events:none;z-index:0}
#app,.toast{position:relative;z-index:1}
h1,h2,h3{font-family:'Rubik',sans-serif}
button{cursor:pointer;font-family:'Heebo',sans-serif}
input,select,textarea{font-family:'Heebo',sans-serif}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}

/* Header */
.header{background:linear-gradient(135deg,var(--blue) 0%,#071530 100%);color:white;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.35);border-bottom:3px solid var(--yellow)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-icon{width:38px;height:38px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.header-title{font-family:'Rubik',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-subtitle{font-size:11px;opacity:.7;margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px}
.header-user{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:6px 12px;color:white;font-size:13px;font-weight:500}
.header-score-badge{background:var(--yellow);color:var(--blue);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700}

/* Top 10 Strip */
.top10-strip{background:var(--blue);padding:8px 16px;overflow-x:auto;white-space:nowrap}
.top10-strip::-webkit-scrollbar{display:none}
.top10-item{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;margin-left:6px;color:white;font-size:12px}
.top10-item.me{background:var(--yellow);color:var(--blue)}
.top10-rank{font-weight:700;font-size:11px}

/* Bottom Nav */
.bottom-nav{background:white;border-top:1px solid var(--border);position:sticky;bottom:0;display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;transition:.15s}
.nav-item.active{color:var(--blue-light)}
.nav-item svg{width:22px;height:22px}
.nav-badge{background:var(--yellow);color:var(--blue);border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;position:absolute;top:-2px;right:-4px}
.nav-item-wrap{position:relative}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
.card-body{padding:16px}

/* Match Card */
.match-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.match-card-header{background:linear-gradient(135deg,var(--blue) 0%,#1A4A8A 100%);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--yellow)}
.match-meta{font-size:11px;color:var(--yellow);font-weight:600}
.match-body{padding:14px}
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.team-name{font-size:14px;font-weight:700;text-align:center;flex:1;line-height:1.3}
.vs-divider{font-size:12px;font-weight:700;color:var(--text3);padding:0 6px}
.score-inputs{display:flex;align-items:center;justify-content:center;gap:8px}
.score-input{width:52px;height:52px;border:2px solid var(--border);border-radius:var(--radius-sm);text-align:center;font-size:22px;font-weight:700;font-family:'Rubik',sans-serif;color:var(--blue);background:white;transition:.2s}
.score-input:focus{outline:none;border-color:var(--blue-light);background:var(--blue-pale)}
.score-input:disabled{background:#F9FAFB;color:var(--text3);cursor:not-allowed}
.score-sep{font-size:24px;font-weight:900;color:var(--text2)}
.match-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:10px 18px;font-size:14px;font-weight:600;transition:.2s;cursor:pointer}
.btn-primary{background:var(--yellow);color:var(--blue)}
.btn-primary:hover{background:var(--yellow-dark)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-yellow{background:var(--yellow);color:var(--blue)}
.btn-yellow:hover{background:var(--yellow-dark)}
.btn-danger{background:var(--danger);color:white}
.btn-danger:hover{background:#1E293B}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Status badges */
.status-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.status-open{background:#DCFCE7;color:#15803D}
.status-locked{background:#FFFBE6;color:var(--blue)}
.status-finished{background:#F3F4F6;color:#6B7280}
.status-scored{background:#D6E4FF;color:var(--blue)}

/* Score result */
.score-result{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.result-exact{background:#DCFCE7;color:#15803D}
.result-direction{background:#DBEAFE;color:#1D4ED8}
.result-miss{background:#F3F4F6;color:#475569}

/* Login page */
.login-page{min-height:100vh;background:#040D1F;display:flex;align-items:center;justify-content:center;padding:24px 16px;position:relative;overflow:hidden;isolation:isolate}
.login-page::before{content:"";position:absolute;inset:0;background:url("assets/login-fans-bg.png") center/cover no-repeat;opacity:.34;transform:scale(1.04);animation:loginBgOpacity 9s ease-in-out infinite;z-index:0}
.login-page::after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(4,13,31,.82) 0%,rgba(13,36,81,.5) 50%,rgba(7,21,48,.82) 100%);z-index:0}
.login-card{background:white;border-radius:20px;padding:32px 28px;width:calc(100vw - 32px);max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5);border-top:4px solid var(--yellow);position:relative;z-index:1}
@keyframes loginBgOpacity{0%,100%{opacity:.28}50%{opacity:.48}}
@keyframes appBgOpacity{0%,100%{opacity:.12}50%{opacity:.28}}
@media (prefers-reduced-motion:reduce){.login-page::before{animation:none;opacity:.38}}
@media (prefers-reduced-motion:reduce){body::before{animation:none;opacity:.18}}
.login-logo{text-align:center;margin-bottom:28px}
.login-ball{font-size:52px;margin-bottom:8px}
.login-title{font-family:'Rubik',sans-serif;font-size:24px;font-weight:900;color:var(--blue);line-height:1.2}
.login-subtitle{font-size:14px;color:var(--text2);margin-top:6px}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;color:var(--text);transition:.2s;background:white}
.form-input:focus{outline:none;border-color:var(--blue-light);background:var(--blue-pale)}
.form-error{background:#EAF2FF;color:var(--blue);border:1px solid #93C5FD;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-top:8px}
.form-hint{font-size:12px;color:var(--text3);margin-top:4px}

/* Leaderboard */
.leaderboard-table{width:100%;border-collapse:collapse}
.leaderboard-table th{background:var(--blue);color:var(--yellow);padding:10px 12px;font-size:12px;font-weight:700;text-align:right}
.leaderboard-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);text-align:right}
.leaderboard-table tr:hover td{background:var(--blue-pale)}
.leaderboard-table tr.me td{background:#FFFBE6;font-weight:600}
.rank-medal-1{color:var(--yellow-dark);font-weight:900}
.rank-medal-2{color:#9CA3AF;font-weight:900}
.rank-medal-3{color:var(--text2);font-weight:900}

/* Admin */
.admin-nav{background:var(--blue);padding:8px;display:flex;gap:4px;overflow-x:auto}
.admin-nav-item{background:rgba(255,255,255,.1);color:white;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:.15s}
.admin-nav-item.active{background:var(--yellow);color:var(--blue)}
.admin-panel{display:none}
.admin-panel.active{display:block}

/* File upload */
.file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:.2s;background:white}
.file-drop:hover{border-color:var(--blue-light);background:var(--blue-pale)}
.file-drop-icon{font-size:40px;margin-bottom:8px}
.file-drop-text{font-size:14px;font-weight:600;color:var(--text2)}
.file-drop-hint{font-size:12px;color:var(--text3);margin-top:4px}

/* Preview table */
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{background:#F3F4F6;padding:8px 10px;text-align:right;font-weight:600;color:var(--text2)}
.preview-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right}
.preview-wrapper{max-height:280px;overflow-y:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}

/* Countdown */
.countdown-card{background:linear-gradient(135deg,var(--blue) 0%,#0D2451 100%);color:white;border-radius:var(--radius);padding:16px;margin-bottom:16px}
.countdown-label{font-size:11px;opacity:.7;margin-bottom:6px}
.countdown-match{font-size:16px;font-weight:700;margin-bottom:10px}
.countdown-timer{display:flex;gap:12px}
.countdown-unit{text-align:center}
.countdown-num{font-family:'Rubik',sans-serif;font-size:28px;font-weight:900;line-height:1;background:rgba(255,255,255,.15);border-radius:6px;padding:4px 10px;min-width:50px;display:block}
.countdown-label2{font-size:10px;opacity:.6;margin-top:3px}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:17px;font-weight:700;color:var(--text)}

/* Scroll container */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{height:4px}
.scroll-x::-webkit-scrollbar-track{background:#F3F4F6}
.scroll-x::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Content area */
.content{flex:1;padding:16px;max-width:700px;margin:0 auto;width:100%}

/* Groups display */
.groups-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.group-card{background:white;border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px}
.group-name{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px}
.group-team{font-size:13px;padding:4px 0;border-bottom:1px solid #F3F4F6;color:var(--text)}
.group-team:last-child{border-bottom:none}

/* Winner badge */
.winner-chip{display:inline-flex;align-items:center;gap:4px;background:var(--yellow-pale);border:1px solid var(--yellow-dark);color:var(--yellow-dark);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:white;border-radius:var(--radius-sm);padding:10px 20px;font-size:13px;font-weight:500;z-index:1000;pointer-events:none;opacity:0;transition:.3s;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* Tabs */
.tabs{display:flex;gap:4px;background:#F3F4F6;border-radius:var(--radius-sm);padding:3px;margin-bottom:16px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;transition:.15s}
.tab.active{background:white;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600;color:var(--text2)}
.empty-hint{font-size:13px;margin-top:6px}

/* Score summary in result cards */
.result-score{font-size:20px;font-weight:900;font-family:'Rubik',sans-serif;color:var(--blue)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}

/* Prediction summary */
.pred-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.pred-row:last-child{border-bottom:none}

/* Admin table */
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{background:var(--blue-pale);padding:10px 12px;text-align:right;font-weight:600;color:var(--blue);border-bottom:2px solid #D1E3FF}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:right;vertical-align:middle}
.admin-table tr:hover td{background:#FAFAFA}

/* Progress bar */
.progress{background:#E5E7EB;border-radius:4px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:var(--blue-light);border-radius:4px;transition:.3s}

/* Special predictions */
.special-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.special-card-header{padding:14px 16px;background:linear-gradient(135deg,#0D2451,var(--blue));color:white}
.special-card-title{font-size:15px;font-weight:700}
.special-card-body{padding:16px}

/* Responsive */
@media(min-width:640px){
  .groups-grid{grid-template-columns:repeat(4,1fr)}
  .content{padding:20px}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SCORING = {
  exactMatch: 5,
  correctOutcome: 2,
  topScorer: 10,
  groupWinner: 5,
  knockoutExact: 7,
  knockoutOutcome: 3,
  knockoutAdvancing: 4,
  lockMinutes: 30,
  knockoutStageWinner: 3,
  tournamentWinner: 10
};

// Top-scorer lock: 11 Jun 2026 22:00 Israel time (UTC+3 = 19:00 UTC)
const TOP_SCORER_LOCK = new Date(2026, 5, 11, 22, 0, 0).getTime(); // local time
function topScorerIsLocked() { return Date.now() >= TOP_SCORER_LOCK; }

const GROUPS_DEF = {
  'א': ['מקסיקו','דרום קוריאה','צ\'כיה','דרום אפריקה'],
  'ב': ['קנדה','בוסניה והרצגובינה','שווייץ','קטאר'],
  'ג': ['ארה"ב','פראגוואי','אוסטרליה','טורקיה'],
  'ד': ['ברזיל','מרוקו','האיטי','סקוטלנד'],
  'ה': ['גרמניה','קוראסאו','חוף השנהב','אקוודור'],
  'ו': ['הולנד','יפן','שבדיה','טוניסיה'],
  'ז': ['ספרד','כף ורדה','ערב הסעודית','אורוגוואי'],
  'ח': ['בלגיה','מצרים','איראן','ניו זילנד'],
  'ט': ['צרפת','סנגל','נורבגיה','עיראק'],
  'י': ['ארגנטינה','אלג\'יריה','אוסטריה','ירדן'],
  'יא': ['פורטוגל','קונגו הדמוקרטית','אוזבקיסטן','קולומביה'],
  'יב': ['אנגליה','קרואטיה','גאנה','פנמה']
};

const TOP_SCORER_OPTIONS = [
  'קיליאן אמבפה',
  'הארי קיין',
  'ליונל מסי',
  'ארלינג הולאנד',
  'לאמין ימאל',
  "ויניסיוס ג'וניור",
  'לאוטרו מרטינס',
  'כריסטיאנו רונאלדו',
  'אוסמן דמבלה',
  'ניק וולטמאדה',
  'חוליאן אלבארס',
  'בוקאיו סאקה',
  'מיקל אויארסבאל',
  'קודי גאקפו',
  'רומלו לוקאקו',
  'ראפיניה',
  'אלברו מוראטה',
  'מרקוס תוראם',
  'ממפיס דפאי',
  "ג'וד בלינגהאם"
];

const ADMIN_LOGIN_ALLOWED_EMAILS = ['noamfrostig@gmail.com'];
const ADMIN_LOGIN_ALLOWED_PHONES = ['0526806838', '+972526806838'];

// ============================================================
// DATA LAYER
// ============================================================
function loadData(key, def) {
  try { const d = localStorage.getItem('mundial_'+key); return d ? JSON.parse(d) : def; } catch { return def; }
}
function saveData(key, val, options={}) {
  try {
    localStorage.setItem('mundial_'+key, JSON.stringify(val));
    if (key === 'users' && !options.skipCloud) queueUsersCloudSave(val);
    return true;
  } catch(e) {
    console.error(e);
    return false;
  }
}

function normalizeEmail(value) {
  return (value || '')
    .toString()
    .replace(/[\u200B-\u200F\u202A-\u202E\u2066-\u2069\uFEFF]/g, '')
    .replace(/\s+/g, '')
    .toLowerCase();
}

function normalizePhone(value) {
  return (value || '')
    .toString()
    .replace(/[\u200B-\u200F\u202A-\u202E\u2066-\u2069\uFEFF]/g, '')
    .replace(/[^\d+]/g, '');
}

function phoneVariants(value) {
  const phone = normalizePhone(value);
  const digits = phone.replace(/\D/g, '');
  const variants = new Set();
  if (phone) variants.add(phone);
  if (digits) variants.add(digits);

  let local = '';
  if (digits.startsWith('972') && digits.length >= 11) local = '0' + digits.slice(3);
  else if (digits.startsWith('0')) local = digits;
  else if (digits.startsWith('5') && digits.length === 9) local = '0' + digits;

  if (local) {
    variants.add(local);
    if (local.startsWith('0')) {
      variants.add('972' + local.slice(1));
      variants.add('+972' + local.slice(1));
    }
  }
  return [...variants].filter(Boolean);
}

function phonesMatch(a, b) {
  const aVariants = phoneVariants(a);
  const bVariants = new Set(phoneVariants(b));
  return aVariants.length > 0 && aVariants.some(v => bVariants.has(v));
}

function canRevealAdminLoginForValue(value) {
  const email = normalizeEmail(value);
  const phone = normalizePhone(value);
  return ADMIN_LOGIN_ALLOWED_EMAILS.includes(email) || ADMIN_LOGIN_ALLOWED_PHONES.some(allowed => phonesMatch(allowed, phone));
}

function canRevealAdminLoginForUser(user) {
  return !!user && (
    canRevealAdminLoginForValue(user.email) ||
    canRevealAdminLoginForValue(user.phone)
  );
}

function isValidEmail(value) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalizeEmail(value));
}

function hasUserPassword(user) {
  return !!(user && (user.passwordHash || user.password));
}

function hashPassword(password, userKey='') {
  const text = `mundial:${userKey}:${password}`;
  let h1 = 0xdeadbeef ^ text.length;
  let h2 = 0x41c6ce57 ^ text.length;
  for (let i = 0; i < text.length; i++) {
    const ch = text.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
  h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
  return `local-v1:${(h2 >>> 0).toString(16).padStart(8,'0')}${(h1 >>> 0).toString(16).padStart(8,'0')}`;
}

function verifyUserPassword(user, password) {
  if (!user || !password) return false;
  if (user.passwordHash) return user.passwordHash === hashPassword(password, user.id || user.email || '');
  if (user.password) return user.password === password;
  return false;
}

function findUserByEmail(users, email) {
  const normalized = normalizeEmail(email);
  return users.find(u => normalizeEmail(u.email) === normalized);
}

function findUserByLogin(users, value) {
  const email = normalizeEmail(value);
  if (email && email.includes('@')) {
    const byEmail = findUserByEmail(users, email);
    if (byEmail) return byEmail;
  }
  const phone = normalizePhone(value);
  if (phone) {
    const byPhone = users.find(u => phonesMatch(u.phone, phone));
    if (byPhone) return byPhone;
  }
  return null;
}

const USERS_API_URL = '/.netlify/functions/users';
let userCloudSaveTimer = null;
let userCloudSaveInProgress = false;

function shouldUseCloudUsers() {
  return typeof fetch === 'function' && location.protocol !== 'file:';
}

function normalizeUserRecord(user) {
  const now = Date.now();
  return {
    id: user.id || ('u' + uid()),
    fullName: user.fullName || user.displayName || '',
    displayName: user.displayName || user.fullName || '',
    teamName: user.teamName || '',
    email: normalizeEmail(user.email),
    phone: user.phone || '',
    passwordHash: user.passwordHash || null,
    passwordSetAt: user.passwordSetAt || null,
    totalScore: Number(user.totalScore || 0),
    exactCount: Number(user.exactCount || 0),
    outcomeCount: Number(user.outcomeCount || 0),
    bonusScore: Number(user.bonusScore || 0),
    createdAt: user.createdAt || now
  };
}

function sameUserIdentity(a, b) {
  const aEmail = normalizeEmail(a.email), bEmail = normalizeEmail(b.email);
  return (aEmail && bEmail && aEmail === bEmail) || phonesMatch(a.phone, b.phone) || (a.id && b.id && a.id === b.id);
}

function mergeUserRecords(base, incoming) {
  const merged = {...base, ...incoming};
  if (!incoming.passwordHash && base.passwordHash) merged.passwordHash = base.passwordHash;
  if (!incoming.passwordSetAt && base.passwordSetAt) merged.passwordSetAt = base.passwordSetAt;
  if (!incoming.totalScore && base.totalScore) merged.totalScore = base.totalScore;
  if (!incoming.exactCount && base.exactCount) merged.exactCount = base.exactCount;
  if (!incoming.outcomeCount && base.outcomeCount) merged.outcomeCount = base.outcomeCount;
  if (!incoming.bonusScore && base.bonusScore) merged.bonusScore = base.bonusScore;
  return normalizeUserRecord(merged);
}

function mergeUserLists(...lists) {
  const merged = [];
  lists.flat().filter(Boolean).forEach(user => {
    const normalized = normalizeUserRecord(user);
    if (!normalized.email && !normalized.phone) return;
    const idx = merged.findIndex(existing => sameUserIdentity(existing, normalized));
    if (idx === -1) merged.push(normalized);
    else merged[idx] = mergeUserRecords(merged[idx], normalized);
  });
  return merged;
}

async function fetchUsersFromCloud() {
  if (!shouldUseCloudUsers()) return null;
  try {
    const res = await fetch(USERS_API_URL, {cache:'no-store'});
    if (!res.ok) return null;
    const data = await res.json();
    return Array.isArray(data.users) ? data.users : [];
  } catch(err) {
    console.warn('Could not load users from cloud', err);
    return null;
  }
}

async function saveUsersToCloud(users, options={}) {
  if (!shouldUseCloudUsers()) return false;
  if (userCloudSaveInProgress) return false;
  userCloudSaveInProgress = true;
  try {
    const res = await fetch(USERS_API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({users: mergeUserLists(users), replace: !!options.replace})
    });
    return res.ok;
  } catch(err) {
    console.warn('Could not save users to cloud', err);
    return false;
  } finally {
    userCloudSaveInProgress = false;
  }
}

function queueUsersCloudSave(users) {
  if (!shouldUseCloudUsers()) return;
  clearTimeout(userCloudSaveTimer);
  userCloudSaveTimer = setTimeout(() => saveUsersToCloud(users), 500);
}

async function syncUsersFromCloud() {
  const cloudUsers = await fetchUsersFromCloud();
  if (!cloudUsers) return;
  const localUsers = loadData('users', []);
  const merged = mergeUserLists(cloudUsers, localUsers);
  saveData('users', merged, {skipCloud:true});
  if (merged.length !== cloudUsers.length) queueUsersCloudSave(merged);
}

function uid() { return Math.random().toString(36).slice(2,9); }

function showToast(msg, duration=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function matchIsLocked(match) {
  const lockMs = SCORING.lockMinutes * 60 * 1000;
  return Date.now() >= (match.startsAt - lockMs);
}

function getOutcome(home, away) {
  if (home > away) return 'home';
  if (away > home) return 'away';
  return 'draw';
}

function getLeaderboard() {
  const users = loadData('users', []);
  return users
    .map(u => ({...u}))
    .sort((a,b) => {
      if (b.totalScore !== a.totalScore) return b.totalScore - a.totalScore;
      if (b.exactCount !== a.exactCount) return b.exactCount - a.exactCount;
      if (b.outcomeCount !== a.outcomeCount) return b.outcomeCount - a.outcomeCount;
      return (a.displayName||'').localeCompare(b.displayName||'');
    })
    .map((u,i) => ({...u, rank: i+1}));
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [day, month] = dateStr.split('.');
  const months = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${day} ${months[parseInt(month)] || ''}`;
}

function computeScoreForPrediction(pred, match) {
  if (match.status !== 'finished' && match.status !== 'scored') return 0;
  if (match.actualHomeScore === null) return 0;
  const isKnockout = match.stage !== 'group';
  const ah = match.actualHomeScore, aa = match.actualAwayScore;
  const ph = pred.predictedHomeScore, pa = pred.predictedAwayScore;
  if (ph === null || pa === null) return 0;
  
  let score = 0;
  const isExact = ph === ah && pa === aa;
  const actualOut = getOutcome(ah, aa);
  const predOut = getOutcome(ph, pa);
  const isOutcome = actualOut === predOut;
  
  if (!isKnockout) {
    if (isExact) score = SCORING.exactMatch;
    else if (isOutcome) score = SCORING.correctOutcome;
  } else {
    if (isExact) {
      score = SCORING.knockoutExact;
    } else if (isOutcome) {
      score = SCORING.knockoutOutcome;
    }
    if (!isExact && pred.predictedAdvancingTeam && match.advancingTeam) {
      if (pred.predictedAdvancingTeam === match.advancingTeam) {
        score += SCORING.knockoutAdvancing;
      }
    }
  }
  return score;
}

function bindLoginPage() {
  let selectedLoginUser = null;
  const loginBtn = document.getElementById('loginBtn');
  const emailInput = document.getElementById('loginInput');
  const passwordStep = document.getElementById('loginPasswordStep');
  const existingPasswordGroup = document.getElementById('existingPasswordGroup');
  const newPasswordGroup = document.getElementById('newPasswordGroup');
  const loginUserHint = document.getElementById('loginUserHint');
  const adminLoginWrap = document.getElementById('adminLoginWrap');

  function updateAdminLoginVisibility() {
    const allowed = canRevealAdminLoginForUser(selectedLoginUser) || canRevealAdminLoginForValue(emailInput.value);
    adminLoginWrap.style.display = allowed ? 'block' : 'none';
  }

  function completeLogin(user) {
    clearAllUnsavedPredictions();
    currentUser = user;
    isAdmin = false;
    currentPage = 'dashboard';
    render();
  }

  function showPasswordStep(user) {
    const needsSetup = !hasUserPassword(user);
    selectedLoginUser = user;
    emailInput.disabled = true;
    passwordStep.style.display = 'block';
    existingPasswordGroup.style.display = needsSetup ? 'none' : 'block';
    newPasswordGroup.style.display = needsSetup ? 'block' : 'none';
    loginUserHint.textContent = needsSetup
      ? `${user.fullName || user.displayName || user.email}, זו ההתחברות הראשונה שלך. בחר סיסמה להמשך.`
      : `${user.fullName || user.displayName || user.email}, הזן את הסיסמה שלך.`;
    loginBtn.textContent = needsSetup ? 'שמירת סיסמה וכניסה' : 'כניסה';
    updateAdminLoginVisibility();
    document.getElementById(needsSetup ? 'loginNewPassword' : 'loginPassword')?.focus();
  }

  function resetLoginStep() {
    selectedLoginUser = null;
    emailInput.disabled = false;
    passwordStep.style.display = 'none';
    loginBtn.textContent = 'המשך';
    document.getElementById('loginError').innerHTML = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginNewPassword').value = '';
    document.getElementById('loginConfirmPassword').value = '';
    updateAdminLoginVisibility();
    emailInput.focus();
  }

  loginBtn.onclick = async () => {
    if (!selectedLoginUser) {
      const loginValue = emailInput.value;
      const email = normalizeEmail(loginValue);
      const phone = normalizePhone(loginValue);
      if (!email && !phone) { showLoginError('נא להזין אימייל או טלפון'); return; }
      if (email.includes('@') && !isValidEmail(email)) { showLoginError('נא להזין אימייל תקין'); return; }
      let users = loadData('users', []);
      let user = findUserByLogin(users, loginValue);
      if (!user && shouldUseCloudUsers()) {
        const originalText = loginBtn.textContent;
        loginBtn.disabled = true;
        loginBtn.textContent = 'בודק...';
        try {
          await syncUsersFromCloud();
          users = loadData('users', []);
          user = findUserByLogin(users, loginValue);
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = originalText;
        }
      }
      if (!user) { showLoginError('משתמש לא נמצא במערכת. פנה למנהל לרישום.'); return; }
      document.getElementById('loginError').innerHTML = '';
      showPasswordStep(user);
      return;
    }

    if (!hasUserPassword(selectedLoginUser)) {
      const password = document.getElementById('loginNewPassword').value;
      const confirmPassword = document.getElementById('loginConfirmPassword').value;
      if (password.length < 6) { showLoginError('הסיסמה חייבת להכיל לפחות 6 תווים'); return; }
      if (password !== confirmPassword) { showLoginError('אימות הסיסמה לא תואם'); return; }

      const users = loadData('users', []);
      const idx = users.findIndex(u => u.id === selectedLoginUser.id);
      if (idx === -1) { showLoginError('המשתמש לא נמצא. נסה להתחבר מחדש.'); return; }
      users[idx] = {
        ...users[idx],
        email: normalizeEmail(users[idx].email),
        passwordHash: hashPassword(password, users[idx].id || users[idx].email || ''),
        passwordSetAt: Date.now()
      };
      delete users[idx].password;
      saveData('users', users, {skipCloud:true});
      const cloudSaved = await saveUsersToCloud(users);
      showToast(cloudSaved || !shouldUseCloudUsers() ? '✅ הסיסמה נשמרה' : '✅ הסיסמה נשמרה במכשיר הזה. עדכון המנהל יתבצע כשהסנכרון יחזור', cloudSaved ? 2200 : 4800);
      completeLogin(users[idx]);
      return;
    }

    const password = document.getElementById('loginPassword').value;
    if (!verifyUserPassword(selectedLoginUser, password)) {
      showLoginError('סיסמה שגויה');
      return;
    }
    saveUsersToCloud(loadData('users', []));
    completeLogin(selectedLoginUser);
  };

  emailInput.onkeydown = e => {
    if (e.key === 'Enter') loginBtn.click();
  };
  emailInput.oninput = updateAdminLoginVisibility;
  ['loginPassword','loginNewPassword','loginConfirmPassword'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.onkeydown = e => { if (e.key === 'Enter') loginBtn.click(); };
  });
  document.getElementById('changeLoginEmail').onclick = resetLoginStep;
  document.getElementById('adminLoginBtn').onclick = () => {
    if (!canRevealAdminLoginForUser(selectedLoginUser) && !canRevealAdminLoginForValue(emailInput.value)) return;
    document.getElementById('adminModal').classList.remove('hidden');
  };
  document.getElementById('adminModalClose').onclick = () => {
    document.getElementById('adminModal').classList.add('hidden');
  };
  document.getElementById('adminLoginSubmit').onclick = () => {
    if (!canRevealAdminLoginForUser(selectedLoginUser) && !canRevealAdminLoginForValue(emailInput.value)) {
      document.getElementById('adminLoginError').innerHTML = '<div class="form-error">כניסת מנהל זמינה רק למשתמש מורשה</div>';
      return;
    }
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    const admin = loadData('admin', {});
    if (email === admin.email && pass === admin.password) {
      isAdmin = true; currentUser = null;
      adminPanel = 'results';
      render();
    } else {
      document.getElementById('adminLoginError').innerHTML = '<div class="form-error">אימייל או סיסמה שגויים</div>';
    }
  };
  updateAdminLoginVisibility();
}

function showLoginError(msg) {
  document.getElementById('loginError').innerHTML = `<div class="form-error">${msg}</div>`;
}

function getMissingCount() {
  const matches = loadData('matches',[]).filter(m => m.status === 'open' && !matchIsLocked(m));
  const preds = loadData('predictions',[]).filter(p => p.userId === currentUser?.id);
  return matches.filter(m => !preds.find(p => p.matchId === m.id && p.predictedHomeScore !== null)).length;
}

function bindUserShell() {
  document.getElementById('logoutBtn').onclick = () => {
    if (!guardUnsavedPredictions()) return;
    clearAllUnsavedPredictions();
    currentUser = null; isAdmin = false; currentPage = 'login'; render();
  };
  bindPredictions();
  bindSpecialPredictions();
}

function renderDashboard() {
  const lb = getLeaderboard();
  const me = lb.find(u => u.id === currentUser.id);
  const rank = me ? me.rank : '-';
  const total = lb.length;
  const matches = loadData('matches',[]);
  const preds = loadData('predictions',[]).filter(p => p.userId === currentUser.id);
  const missing = getMissingCount();
  
  // Next match
  const now = Date.now();
  const upcoming = matches.filter(m => m.status === 'open' && m.startsAt > now).sort((a,b) => a.startsAt - b.startsAt);
  const nextMatch = upcoming[0];
  
  let countdownHtml = '';
  if (nextMatch) {
    const diff = nextMatch.startsAt - now;
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    countdownHtml = `
      <div class="countdown-card" id="countdown-card">
        <div class="countdown-label">⏱ המשחק הקרוב</div>
        <div class="countdown-match">${nextMatch.homeTeam} נגד ${nextMatch.awayTeam}</div>
        <div style="font-size:11px;opacity:.6;margin-bottom:10px">${formatDate(nextMatch.date)} ${nextMatch.time} • ${nextMatch.hostCity}</div>
        <div class="countdown-timer">
          <div class="countdown-unit"><span class="countdown-num" id="cd-days">${days}</span><span class="countdown-label2">ימים</span></div>
          <div class="countdown-unit"><span class="countdown-num" id="cd-hours">${String(hours).padStart(2,'0')}</span><span class="countdown-label2">שעות</span></div>
          <div class="countdown-unit"><span class="countdown-num" id="cd-mins">${String(mins).padStart(2,'0')}</span><span class="countdown-label2">דקות</span></div>
          <div class="countdown-unit"><span class="countdown-num" id="cd-secs">${String(secs).padStart(2,'0')}</span><span class="countdown-label2">שניות</span></div>
        </div>
      </div>`;
    startCountdown(nextMatch.startsAt);
  }
  
  // Recent results
  const scored = matches.filter(m => m.status === 'scored' || m.status === 'finished').sort((a,b) => b.startsAt - a.startsAt).slice(0,5);
  const recentHtml = scored.map(m => {
    const pred = preds.find(p => p.matchId === m.id);
    let resultBadge = '';
    if (pred && m.actualHomeScore !== null) {
      if (pred.predictedHomeScore === m.actualHomeScore && pred.predictedAwayScore === m.actualAwayScore) {
        resultBadge = '<span class="score-result result-exact">✓ מדויק</span>';
      } else if (getOutcome(pred.predictedHomeScore, pred.predictedAwayScore) === getOutcome(m.actualHomeScore, m.actualAwayScore)) {
        resultBadge = '<span class="score-result result-direction">↗ כיוון</span>';
      } else if (pred.predictedHomeScore !== null) {
        resultBadge = '<span class="score-result result-miss">✗ החטאה</span>';
      }
    }
    return `
      <div class="pred-row">
        <div>
          <div style="font-size:13px;font-weight:600">${m.homeTeam} נ ${m.awayTeam}</div>
          <div style="font-size:11px;color:var(--text3)">${formatDate(m.date)}</div>
        </div>
        <div style="text-align:left;display:flex;align-items:center;gap:8px">
          ${pred?.predictedHomeScore !== null && pred?.predictedHomeScore !== undefined ? `<span style="font-size:12px;color:var(--text3)">${pred.predictedHomeScore}:${pred.predictedAwayScore}</span>` : ''}
          <span class="result-score">${m.actualHomeScore}:${m.actualAwayScore}</span>
          ${resultBadge}
        </div>
      </div>`;
  }).join('');

  const statsHtml = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div class="card" style="text-align:center;padding:14px 8px">
        <div style="font-size:26px;font-weight:900;font-family:'Rubik';color:var(--blue)">${me?.totalScore || 0}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">ניקוד</div>
      </div>
      <div class="card" style="text-align:center;padding:14px 8px">
        <div style="font-size:26px;font-weight:900;font-family:'Rubik';color:var(--yellow-dark)">#${rank}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">מקום מתוך ${total}</div>
      </div>
      <div class="card" style="text-align:center;padding:14px 8px;${missing>0?'border:2px solid var(--yellow)':''}">
        <div style="font-size:26px;font-weight:900;font-family:'Rubik';color:${missing>0?'var(--blue)':'var(--success)'}">${missing}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">ניחושים חסרים</div>
      </div>
    </div>`;

  return `
    ${countdownHtml}
    ${statsHtml}
    ${missing > 0 ? `
    <div style="background:var(--yellow-pale);border:1px solid var(--yellow);border-radius:var(--radius);padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">⚠️</span>
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--blue)">יש לך ${missing} ניחושים חסרים!</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">המהר לנחש לפני נעילת המשחקים</div>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-right:auto" onclick="navTo('predictions')">נחש עכשיו</button>
    </div>` : ''}
    ${scored.length > 0 ? `
    <div class="card">
      <div class="card-header"><span class="card-title">📊 תוצאות אחרונות</span></div>
      <div class="card-body" style="padding:0 16px">${recentHtml}</div>
    </div>` : `
    <div class="empty-state">
      <div class="empty-icon">⚽</div>
      <div class="empty-text">הטורניר עוד לא התחיל</div>
      <div class="empty-hint">המשחק הראשון ב-11.6 • מקסיקו נגד דרום אפריקה</div>
    </div>`}`;
}

let countdownInterval = null;
function startCountdown(startsAt) {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const diff = startsAt - Date.now();
    if (diff <= 0) { clearInterval(countdownInterval); return; }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    const el = id => document.getElementById(id);
    if (el('cd-days')) el('cd-days').textContent = days;
    if (el('cd-hours')) el('cd-hours').textContent = String(hours).padStart(2,'0');
    if (el('cd-mins')) el('cd-mins').textContent = String(mins).padStart(2,'0');
    if (el('cd-secs')) el('cd-secs').textContent = String(secs).padStart(2,'0');
  }, 1000);
}

function renderPredictions() {
  const matches = loadData('matches',[]).filter(m => m.stage === 'group').sort((a,b) => a.startsAt - b.startsAt);
  const koMatches = loadData('knockoutMatches',[]).sort((a,b) => a.startsAt - b.startsAt);
  const preds = loadData('predictions',[]).filter(p => p.userId === currentUser.id);
  const koPreds = loadData('knockoutPredictions',[]).filter(p => p.userId === currentUser.id);
  const stageLabels = {round_of_32:'32 האחרונות',round_of_16:'שמינית גמר',quarter_final:'רבע גמר',semi_final:'חצי גמר',third_place:'מקום שלישי',final:'גמר'};
  
  // Group by date
  const byDate = {};
  matches.forEach(m => {
    const k = m.date;
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(m);
  });
  
  let html = `<div class="section-header"><h2 class="section-title">⚽ ניחושי שלב הבתים</h2></div>
  <div style="background:var(--blue);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--yellow);display:flex;gap:12px;flex-wrap:wrap">
    <span>🎯 תוצאה מדויקת = <strong style="color:white">5 נק'</strong></span>
    <span>↗ כיוון נכון = <strong style="color:white">2 נק'</strong></span>
    <span>✗ טעות = <strong style="color:white">0 נק'</strong></span>
  </div>`;
  
  Object.entries(byDate).forEach(([date, dayMatches]) => {
    html += `<div style="font-size:13px;font-weight:700;color:var(--text2);margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--blue-pale)">${formatDate(date)}</div>`;
    dayMatches.forEach(m => {
      const pred = preds.find(p => p.matchId === m.id);
      const locked = matchIsLocked(m);
      const isScored = m.status === 'scored';
      
      let statusBadge = '';
      if (isScored) statusBadge = '<span class="status-badge status-scored">חושב ניקוד</span>';
      else if (m.status === 'finished') statusBadge = '<span class="status-badge status-finished">הסתיים</span>';
      else if (locked) statusBadge = '<span class="status-badge status-locked">🔒 נעול</span>';
      else statusBadge = '<span class="status-badge status-open">✓ פתוח</span>';
      
      let resultBadge = '';
      if (isScored && pred?.scoreAwarded !== undefined) {
        if (pred.isExact) resultBadge = '<span class="score-result result-exact">+' + SCORING.exactMatch + ' נק\'</span>';
        else if (pred.isOutcomeCorrect) resultBadge = '<span class="score-result result-direction">+' + SCORING.correctOutcome + ' נק\'</span>';
        else if (pred.predictedHomeScore !== null) resultBadge = '<span class="score-result result-miss">0 נק\'</span>';
      }
      
      const hv = pred?.predictedHomeScore !== null && pred?.predictedHomeScore !== undefined ? pred.predictedHomeScore : '';
      const av = pred?.predictedAwayScore !== null && pred?.predictedAwayScore !== undefined ? pred.predictedAwayScore : '';
      
      html += `
        <div class="match-card">
          <div class="match-card-header">
            <span class="match-meta">🕐 ${m.time} • 📍 ${m.hostCity}</span>
            ${statusBadge}
          </div>
          <div class="match-body">
            <div class="match-teams">
              <span class="team-name">${m.homeTeam}</span>
              <span class="vs-divider">נגד</span>
              <span class="team-name">${m.awayTeam}</span>
            </div>
            <div class="score-inputs">
              <input type="number" class="score-input" min="0" max="20" 
                id="h_${m.id}" value="${hv}" ${locked||isScored?'disabled':''} 
                placeholder="0" oninput="autoSavePred('${m.id}')" onchange="autoSavePred('${m.id}')">
              <span class="score-sep">:</span>
              <input type="number" class="score-input" min="0" max="20" 
                id="a_${m.id}" value="${av}" ${locked||isScored?'disabled':''} 
                placeholder="0" oninput="autoSavePred('${m.id}')" onchange="autoSavePred('${m.id}')">
            </div>
            ${m.actualHomeScore !== null ? `
            <div style="text-align:center;margin-top:8px;font-size:13px;color:var(--text2)">
              תוצאה: <strong>${m.actualHomeScore}:${m.actualAwayScore}</strong>
              ${resultBadge}
            </div>` : ''}
            <div class="match-footer">
              <div style="font-size:11px;color:var(--text3)">${pred?.submittedAt ? '✅ נשמר' : (locked ? '⚠️ לא ניחשת' : '')}</div>
              ${!locked && !isScored ? `<button class="btn btn-primary btn-sm" onclick="savePrediction('${m.id}')">שמור</button>` : ''}
            </div>
          </div>
        </div>`;
    });
  });
  
  // Knockout matches section
  if (koMatches.length > 0) {
    html += `<div class="section-header" style="margin-top:24px"><h2 class="section-title">⚡ ניחושי שלב הנוקאאוט</h2></div>
    <div style="background:var(--blue);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--yellow);display:flex;gap:12px;flex-wrap:wrap">

      <span>⬆️ עולה נכון = <strong style="color:white">+4 נק'</strong></span>
    </div>`;
    
    koMatches.forEach(m => {
      const pred = koPreds.find(p => p.matchId === m.id);
      const locked = matchIsLocked(m);
      const isScored = m.status === 'scored';
      const stageLabel = stageLabels[m.stage] || m.stage;
      
      let statusBadge = '';
      if (isScored) statusBadge = '<span class="status-badge status-scored">חושב ניקוד</span>';
      else if (m.status === 'finished') statusBadge = '<span class="status-badge status-finished">הסתיים</span>';
      else if (locked) statusBadge = '<span class="status-badge status-locked">🔒 נעול</span>';
      else statusBadge = '<span class="status-badge status-open">✓ פתוח</span>';
      
      let resultBadge = '';
      if (isScored && pred?.scoreAwarded !== undefined) {
        if (pred.isExact) resultBadge = `<span class="score-result result-exact">+${SCORING.knockoutExact} נק'</span>`;
        else if (pred.isOutcomeCorrect) resultBadge = `<span class="score-result result-direction">+${SCORING.knockoutOutcome} נק'</span>`;
        else if (pred.predictedHomeScore !== null) resultBadge = '<span class="score-result result-miss">0 נק\'</span>';
      }
      
      const hv = pred?.predictedHomeScore !== null && pred?.predictedHomeScore !== undefined ? pred.predictedHomeScore : '';
      const av = pred?.predictedAwayScore !== null && pred?.predictedAwayScore !== undefined ? pred.predictedAwayScore : '';
      
      html += `
        <div class="match-card">
          <div class="match-card-header" style="background:linear-gradient(135deg,var(--blue) 0%,var(--blue-light) 100%)">
            <span class="match-meta">⚡ ${stageLabel} • ${m.time} • 📍 ${m.hostCity}</span>
            ${statusBadge}
          </div>
          <div class="match-body">
            <div class="match-teams">
              <span class="team-name">${m.homeTeam}</span>
              <span class="vs-divider">נגד</span>
              <span class="team-name">${m.awayTeam}</span>
            </div>
            <div class="score-inputs">
              <input type="number" class="score-input" min="0" max="20" 
                id="kh_${m.id}" value="${hv}" ${locked||isScored?'disabled':''} 
                placeholder="0" oninput="autoSaveKOPred('${m.id}')" onchange="autoSaveKOPred('${m.id}')">
              <span class="score-sep">:</span>
              <input type="number" class="score-input" min="0" max="20" 
                id="ka_${m.id}" value="${av}" ${locked||isScored?'disabled':''} 
                placeholder="0" oninput="autoSaveKOPred('${m.id}')" onchange="autoSaveKOPred('${m.id}')">
            </div>
            ${!locked && !isScored ? `
            <div style="margin-top:10px">
              <select class="form-input" id="kadv_${m.id}" onchange="autoSaveKOPred('${m.id}')" style="font-size:13px">
                <option value="${pred?.predictedAdvancingTeam||''}">-- מי עולה לשלב הבא? --</option>
                <option value="${m.homeTeam}" ${pred?.predictedAdvancingTeam===m.homeTeam?'selected':''}>${m.homeTeam}</option>
                <option value="${m.awayTeam}" ${pred?.predictedAdvancingTeam===m.awayTeam?'selected':''}>${m.awayTeam}</option>
              </select>
            </div>` : pred?.predictedAdvancingTeam ? `<div style="text-align:center;margin-top:6px;font-size:12px;color:var(--text2)">עולה: <strong>${pred.predictedAdvancingTeam}</strong></div>` : ''}
            ${m.actualHomeScore !== null ? `
            <div style="text-align:center;margin-top:8px;font-size:13px;color:var(--text2)">
              תוצאה: <strong>${m.actualHomeScore}:${m.actualAwayScore}</strong>
              ${resultBadge}
            </div>` : ''}
            <div class="match-footer">
              <div style="font-size:11px;color:var(--text3)">${pred?.submittedAt ? '✅ נשמר' : (locked ? '⚠️ לא ניחשת' : '')}</div>
              ${!locked && !isScored ? `<button class="btn btn-primary btn-sm" onclick="saveKOPrediction('${m.id}')">שמור</button>` : ''}
            </div>
          </div>
        </div>`;
    });
  }
  
  return html;
}

window.saveKOPrediction = function(matchId) {
  const hEl = document.getElementById('kh_'+matchId);
  const aEl = document.getElementById('ka_'+matchId);
  const advEl = document.getElementById('kadv_'+matchId);
  if (!hEl || !aEl) return;
  const hv = hEl.value.trim(), av = aEl.value.trim();
  if (hv === '' || av === '') { showToast('נא למלא את שני השדות'); return; }
  const h = parseInt(hv), a = parseInt(av);
  if (isNaN(h)||isNaN(a)||h<0||a<0) { showToast('נא להזין מספרים תקינים'); return; }
  
  const kms = loadData('knockoutMatches',[]);
  const match = kms.find(m => m.id === matchId);
  if (!match) return;
  if (matchIsLocked(match)) { showToast('המשחק כבר נעול'); return; }
  
  let koPreds = loadData('knockoutPredictions',[]);
  const existing = koPreds.find(p => p.userId === currentUser.id && p.matchId === matchId);
  const adv = advEl?.value || null;
  const now = Date.now();
  if (existing) {
    existing.predictedHomeScore = h; existing.predictedAwayScore = a;
    existing.predictedOutcome = getOutcome(h,a);
    existing.predictedAdvancingTeam = adv;
    existing.updatedAt = now;
  } else {
    koPreds.push({id:uid(),userId:currentUser.id,matchId,
      predictedHomeScore:h,predictedAwayScore:a,predictedOutcome:getOutcome(h,a),
      predictedAdvancingTeam:adv,scoreAwarded:0,isExact:false,isOutcomeCorrect:false,
      submittedAt:now,updatedAt:now});
  }
  saveData('knockoutPredictions', koPreds);
  clearUnsavedPrediction('ko:' + matchId);
  showToast('✅ ניחוש נוקאאוט נשמר!');
};

window.autoSaveKOPred = function(matchId) {
  markUnsavedPrediction('ko:' + matchId);
};

window.savePrediction = function(matchId) {
  const hEl = document.getElementById('h_'+matchId);
  const aEl = document.getElementById('a_'+matchId);
  if (!hEl || !aEl) return;
  const hv = hEl.value.trim();
  const av = aEl.value.trim();
  if (hv === '' || av === '') { showToast('נא למלא את שני השדות'); return; }
  const h = parseInt(hv), a = parseInt(av);
  if (isNaN(h)||isNaN(a)||h<0||a<0) { showToast('נא להזין מספרים תקינים'); return; }
  
  const matches = loadData('matches',[]);
  const match = matches.find(m => m.id === matchId);
  if (!match) return;
  if (matchIsLocked(match)) { showToast('המשחק כבר נעול'); return; }
  
  let preds = loadData('predictions',[]);
  const existing = preds.find(p => p.userId === currentUser.id && p.matchId === matchId);
  const now = Date.now();
  if (existing) {
    existing.predictedHomeScore = h;
    existing.predictedAwayScore = a;
    existing.predictedOutcome = getOutcome(h,a);
    existing.updatedAt = now;
  } else {
    preds.push({
      id: uid(), userId: currentUser.id, matchId,
      predictedHomeScore: h, predictedAwayScore: a,
      predictedOutcome: getOutcome(h,a),
      predictedAdvancingTeam: null,
      scoreAwarded: 0, isExact: false, isOutcomeCorrect: false,
      submittedAt: now, updatedAt: now, lockedAt: null
    });
  }
  saveData('predictions', preds);
  clearUnsavedPrediction('match:' + matchId);
  showToast('✅ ניחוש נשמר!');
  
  const el = hEl.closest('.match-card');
  if (el) {
    const footer = el.querySelector('.match-footer div');
    if (footer) footer.textContent = '✅ נשמר';
  }
};

function renderSpecialPredictions() {
  const specials = loadData('specialPredictions', {});
  const mySpecial = specials[currentUser.id] || {};
  const groups = loadData('groups', GROUPS_DEF);
  const groupsLocked = loadData('specialsLocked', false);
  const tsLocked = topScorerIsLocked();
  const koMatches = loadData('knockoutMatches', []);

  // Build list of teams that appeared in knockout matches by stage
  function getKOTeamsByStage(stage) {
    return koMatches.filter(m => m.stage === stage).flatMap(m => [m.homeTeam, m.awayTeam]).filter((v,i,a)=>a.indexOf(v)===i);
  }
  const r16teams = getKOTeamsByStage('round_of_16');
  const r16all   = koMatches.filter(m=>m.stage==='round_of_16').flatMap(m=>[m.homeTeam,m.awayTeam]).filter((v,i,a)=>a.indexOf(v)===i);
  const qfteams  = getKOTeamsByStage('quarter_final');
  const sfteams  = getKOTeamsByStage('semi_final');
  const fteams   = getKOTeamsByStage('final');
  // All known teams (group stage)
  const allTeams = Object.values(GROUPS_DEF).flat();
  const sortTeamsAlpha = teams => [...teams].sort((a,b) => a.localeCompare(b, 'he'));

  function stageCard(id, title, emoji, points, lockLabel, isLocked, selected, teamList, placeholder) {
    const opts = teamList.length > 0
      ? teamList.map(t => `<option value="${t}" ${selected===t?'selected':''}>${t}</option>`).join('')
      : allTeams.map(t => `<option value="${t}" ${selected===t?'selected':''}>${t}</option>`).join('');
    return `
      <div class="special-card" style="margin-bottom:12px">
        <div class="special-card-header" style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="special-card-title">${emoji} ${title}</div>
            <div style="font-size:11px;opacity:.7;margin-top:2px">בונוס: ${points} נקודות • ${lockLabel}</div>
          </div>
          ${selected ? `<span class="winner-chip" style="background:rgba(245,197,24,.25);border-color:var(--yellow);color:var(--yellow)">🏆 ${selected}</span>` : ''}
        </div>
        <div class="special-card-body">
          ${isLocked ? `
            <div style="font-size:14px;font-weight:600;color:var(--blue)">${selected || 'לא נבחר'}</div>
            <div class="status-badge status-locked" style="margin-top:8px;display:inline-flex">🔒 נעול</div>
          ` : `
            <select class="form-input" id="${id}" onchange="markUnsavedPrediction('special:${id}')" style="margin-bottom:8px">
              <option value="">${placeholder}</option>
              ${opts}
            </select>
            <button class="btn btn-primary btn-sm btn-full" onclick="saveStageWinner('${id}','${id}')">שמור</button>
          `}
        </div>
      </div>`;
  }

  const groupsHtml = Object.entries(groups).map(([grp, teams]) => {
    const selected = mySpecial[`group_${grp}`] || '';
    return `
      <div class="match-card" style="margin-bottom:8px">
        <div class="match-card-header">
          <span class="match-meta">בית ${grp}</span>
          ${selected ? `<span class="winner-chip">🏆 ${selected}</span>` : '<span class="status-badge status-open">לא נבחר</span>'}
        </div>
        <div class="match-body">
          <select class="form-input" id="gw_${grp}" ${groupsLocked?'disabled':''} onchange="markUnsavedPrediction('special:group_${grp}')" style="margin-bottom:8px">
            <option value="">-- בחר מנצחת בית ${grp} --</option>
            ${teams.map(t => `<option value="${t}" ${selected===t?'selected':''}>${t}</option>`).join('')}
          </select>
          ${!groupsLocked ? `<button class="btn btn-primary btn-sm btn-full" onclick="saveGroupWinner('${grp}')">שמור בחירה</button>` : ''}
        </div>
      </div>`;
  }).join('');

  const tsSelected = mySpecial.topScorer || '';
  const tsIsOther = tsSelected && !TOP_SCORER_OPTIONS.includes(tsSelected);
  const topScorerOptionsHtml = TOP_SCORER_OPTIONS
    .map(name => `<option value="${name}" ${tsSelected===name?'selected':''}>${name}</option>`)
    .join('');

  // Determine lock labels per stage (based on first match in that stage)
  function firstMatchLabel(stage) {
    const first = koMatches.filter(m=>m.stage===stage).sort((a,b)=>a.startsAt-b.startsAt)[0];
    return first ? `נסגר 30 דקות לפני ${first.date} ${first.time}` : 'נסגר לפני תחילת השלב';
  }

  return `
    <div class="section-header"><h2 class="section-title">⭐ הימורים מיוחדים</h2></div>

    <!-- TOP SCORER -->
    <div class="special-card" style="margin-bottom:12px">
      <div class="special-card-header">
        <div class="special-card-title">👑 מלך השערים</div>
        <div style="font-size:11px;opacity:.7;margin-top:2px">בונוס: ${SCORING.topScorer} נקודות • נסגר 11.6 בשעה 22:00</div>
      </div>
      <div class="special-card-body">
        ${tsLocked ? `
          <div style="font-size:14px;font-weight:600;color:var(--blue)">${tsSelected || 'לא מולא'}</div>
          <div class="status-badge status-locked" style="margin-top:8px;display:inline-flex">🔒 נעול (11.6 22:00)</div>
        ` : `
          <select class="form-input" id="topScorerSelect" onchange="toggleTopScorerOther(); markUnsavedPrediction('special:topScorer')" style="margin-bottom:8px">
            <option value="">-- בחר מלך שערים --</option>
            ${topScorerOptionsHtml}
            <option value="__other" ${tsIsOther?'selected':''}>אחר</option>
          </select>
          <input type="text" class="form-input" id="topScorerOtherInput" value="${tsIsOther ? tsSelected : ''}" oninput="markUnsavedPrediction('special:topScorer')"
            placeholder="שם השחקן" style="${tsIsOther ? '' : 'display:none'}">
          <div style="font-size:11px;color:var(--blue-light);margin-top:4px;font-weight:600">⏰ ייסגר אוטומטית ב-11.6 בשעה 22:00</div>
          <button class="btn btn-primary btn-sm btn-full" style="margin-top:10px" onclick="saveTopScorer()">שמור מלך שערים</button>
        `}
      </div>
    </div>

    <!-- TOURNAMENT WINNER -->
    ${stageCard(
      'pred_tournament_winner', 'אלופת העולם', '🌍', SCORING.tournamentWinner,
      fteams.length ? firstMatchLabel('final') : 'נסגר לפני הגמר',
      fteams.length > 0 && matchIsLocked(koMatches.filter(m=>m.stage==='final').sort((a,b)=>a.startsAt-b.startsAt)[0]||{startsAt:Infinity}),
      mySpecial.tournament_winner || '', sortTeamsAlpha(fteams.length ? fteams : allTeams),
      '-- מי תהיה אלופת העולם? --'
    )}

    <!-- SEMI FINAL WINNERS -->
    ${sfteams.length > 0 ? stageCard(
      'pred_sf1_winner', 'מנצחת חצי גמר 1', '🥇', SCORING.knockoutStageWinner,
      firstMatchLabel('semi_final'),
      matchIsLocked(koMatches.filter(m=>m.stage==='semi_final').sort((a,b)=>a.startsAt-b.startsAt)[0]||{startsAt:Infinity}),
      mySpecial.sf1_winner || '', sfteams, '-- בחר מנצחת חצי גמר 1 --'
    ) : ''}
    ${sfteams.length > 1 ? stageCard(
      'pred_sf2_winner', 'מנצחת חצי גמר 2', '🥇', SCORING.knockoutStageWinner,
      firstMatchLabel('semi_final'),
      matchIsLocked(koMatches.filter(m=>m.stage==='semi_final').sort((a,b)=>a.startsAt-b.startsAt)[0]||{startsAt:Infinity}),
      mySpecial.sf2_winner || '', sfteams, '-- בחר מנצחת חצי גמר 2 --'
    ) : ''}

    <!-- QUARTER FINAL WINNERS -->
    ${qfteams.length > 0 ? `
    <div style="background:var(--blue);border-radius:var(--radius);padding:10px 14px;margin:12px 0 8px;font-size:13px;color:var(--yellow);font-weight:700">
      🏅 מנצחות רבע גמר — ${SCORING.knockoutStageWinner} נקודות כל אחת
    </div>
    ${koMatches.filter(m=>m.stage==='quarter_final').sort((a,b)=>a.startsAt-b.startsAt).map((m,i) => {
      const key = 'qf'+(i+1)+'_winner';
      const isLocked = matchIsLocked(m);
      const sel = mySpecial[key] || '';
      return `
        <div class="match-card" style="margin-bottom:8px">
          <div class="match-card-header">
            <span class="match-meta">⚡ רבע גמר ${i+1} • ${m.date} ${m.time}</span>
            ${sel ? `<span class="winner-chip">🏆 ${sel}</span>` : '<span class="status-badge status-open">לא נבחר</span>'}
          </div>
          <div class="match-body">
            <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${m.homeTeam} נגד ${m.awayTeam}</div>
            ${isLocked ? `
              <div style="font-size:13px;font-weight:600">${sel || 'לא נבחר'}</div>
              <span class="status-badge status-locked" style="margin-top:6px;display:inline-flex">🔒 נעול</span>
            ` : `
              <select class="form-input" id="pred_${key}" onchange="markUnsavedPrediction('special:${key}')" style="margin-bottom:8px">
                <option value="">-- מי תנצח? --</option>
                <option value="${m.homeTeam}" ${sel===m.homeTeam?'selected':''}>${m.homeTeam}</option>
                <option value="${m.awayTeam}" ${sel===m.awayTeam?'selected':''}>${m.awayTeam}</option>
              </select>
              <button class="btn btn-primary btn-sm btn-full" onclick="saveStageWinner('pred_${key}','${key}')">שמור</button>
            `}
          </div>
        </div>`;
    }).join('')}` : ''}

    <!-- ROUND OF 16 WINNERS -->
    ${r16all.length > 0 ? `
    <div style="background:var(--blue);border-radius:var(--radius);padding:10px 14px;margin:12px 0 8px;font-size:13px;color:var(--yellow);font-weight:700">
      🎽 מנצחות שמינית גמר — ${SCORING.knockoutStageWinner} נקודות כל אחת
    </div>
    ${koMatches.filter(m=>m.stage==='round_of_16').sort((a,b)=>a.startsAt-b.startsAt).map((m,i) => {
      const key = 'r16'+(i+1)+'_winner';
      const isLocked = matchIsLocked(m);
      const sel = mySpecial[key] || '';
      return `
        <div class="match-card" style="margin-bottom:8px">
          <div class="match-card-header">
            <span class="match-meta">⚡ שמינית גמר ${i+1} • ${m.date} ${m.time}</span>

            <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${m.homeTeam} נגד ${m.awayTeam}</div>
            ${isLocked ? `
              <div style="font-size:13px;font-weight:600">${sel || 'לא נבחר'}</div>
              <span class="status-badge status-locked" style="margin-top:6px;display:inline-flex">🔒 נעול</span>
            ` : `
              <select class="form-input" id="pred_${key}" onchange="markUnsavedPrediction('special:${key}')" style="margin-bottom:8px">
                <option value="">-- מי תנצח? --</option>
                <option value="${m.homeTeam}" ${sel===m.homeTeam?'selected':''}>${m.homeTeam}</option>
                <option value="${m.awayTeam}" ${sel===m.awayTeam?'selected':''}>${m.awayTeam}</option>
              </select>
              <button class="btn btn-primary btn-sm btn-full" onclick="saveStageWinner('pred_${key}','${key}')">שמור</button>
            `}
          </div>
        </div>`;
    }).join('')}` : ''}

    <!-- GROUP WINNERS -->
    <div style="margin-top:16px">
      <div class="section-header"><h2 class="section-title" style="font-size:15px">🏆 מנצחות בתים</h2></div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:12px">בונוס ${SCORING.groupWinner} נקודות לכל בית נכון • נסגר לפני תחילת כל משחק</p>
      ${groupsHtml}
    </div>`;
}

  otherInput.style.display = select.value === '__other' ? 'block' : 'none';

window.saveGroupWinner = function(grp) {

  let specials = loadData('specialPredictions', {});
  if (!specials[currentUser.id]) specials[currentUser.id] = {};
  specials[currentUser.id][`group_${grp}`] = sel.value;
  specials[currentUser.id][`group_${grp}_time`] = Date.now();
  saveData('specialPredictions', specials);
  clearUnsavedPrediction('special:group_' + grp);
  showToast(`✅ נשמר: ${sel.value} מנצחת בית ${grp}`);

window.saveTopScorer = function() {
  if (topScorerIsLocked()) { showToast('🔒 ניחוש מלך השערים נעול (11.6 22:00)'); return; }
  const select = document.getElementById('topScorerSelect');
  const otherInput = document.getElementById('topScorerOtherInput');
  if (!select || !select.value) { showToast('נא לבחור שחקן'); return; }
  const val = select.value === '__other' ? otherInput?.value?.trim() : select.value;
  if (!val) { showToast('נא להזין שם שחקן'); return; }
  let specials = loadData('specialPredictions', {});
  if (!specials[currentUser.id]) specials[currentUser.id] = {};
  specials[currentUser.id].topScorer = val;
  specials[currentUser.id].topScorerTime = Date.now();
  saveData('specialPredictions', specials);
  clearUnsavedPrediction('special:topScorer');
  showToast(`✅ נשמר: ${val} כמלך השערים שלך`);
};

// Save any stage-winner prediction (knockout rounds / tournament winner)
window.saveStageWinner = function(elId, key) {
  const sel = document.getElementById(elId);
  if (!sel || !sel.value) { showToast('נא לבחור קבוצה'); return; }
  let specials = loadData('specialPredictions', {});
  if (!specials[currentUser.id]) specials[currentUser.id] = {};
  specials[currentUser.id][key] = sel.value;
  specials[currentUser.id][key + '_time'] = Date.now();
  saveData('specialPredictions', specials);
  clearUnsavedPrediction('special:' + key);
  showToast(`✅ נשמר: ${sel.value}`);
  // Re-render the special page so selection shows immediately
  const pg = document.getElementById('page-special');
  if (pg && unsavedPredictionKeys.size === 0) { pg.querySelector('.content').innerHTML = renderSpecialPredictions(); bindSpecialPredictions(); }
};

window.navTo = function(page) {

  currentPage = page;

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const pg = document.getElementById('page-'+page);
  if (pg) {
    pg.classList.add('active');
    pg.querySelector('.content').innerHTML = (() => {
      if (page === 'dashboard') return renderDashboard();
      if (page === 'predictions') return renderPredictions();
      if (page === 'special') return renderSpecialPredictions();
      if (page === 'leaderboard') return renderLeaderboard();
      return '';
    })();
    if (page === 'dashboard') startCountdown;
  }
  const navBtns = document.querySelectorAll('.nav-item');
  const pageIndex = ['dashboard','predictions','special','leaderboard'].indexOf(page);
  if (navBtns[pageIndex]) navBtns[pageIndex].classList.add('active');
  window.scrollTo(0,0);
};

window.filterResults = function(type, btn) {

  });

window.saveResult = function(matchId) {
  const h = parseInt(document.getElementById('rh_'+matchId)?.value);
  const a = parseInt(document.getElementById('ra_'+matchId)?.value);
  if (isNaN(h)||isNaN(a)||h<0||a<0) { showToast('נא להזין תוצאה תקינה'); return; }
  
  const matches = loadData('matches',[]);
  const m = matches.find(x => x.id === matchId);
  if (!m) return;
  m.actualHomeScore = h;
  m.actualAwayScore = a;
  m.actualWinner = getOutcome(h,a);
  m.status = 'finished';
  saveData('matches', matches);
  showToast(`✅ תוצאה נשמרה: ${h}:${a}`);
  switchAdminPanel('results');
};

window.calcMatch = function(matchId) {
  const matches = loadData('matches',[]);
  const m = matches.find(x => x.id === matchId);
  if (!m || m.actualHomeScore === null) { showToast('נא לשמור תוצאה קודם'); return; }
  
  let preds = loadData('predictions',[]);
  let users = loadData('users',[]);
  
  preds.forEach(pred => {
    if (pred.matchId !== matchId) return;
    const old = pred.scoreAwarded || 0;
    const user = users.find(u => u.id === pred.userId);
    if (!user) return;
    
    const isExact = pred.predictedHomeScore === m.actualHomeScore && pred.predictedAwayScore === m.actualAwayScore;
    const isOut = getOutcome(pred.predictedHomeScore, pred.predictedAwayScore) === getOutcome(m.actualHomeScore, m.actualAwayScore);
    
    user.totalScore = (user.totalScore || 0) - old;
    if (user.exactCount && pred.isExact) user.exactCount--;
    if (user.outcomeCount && pred.isOutcomeCorrect && !pred.isExact) user.outcomeCount--;
    
    const newScore = computeScoreForPrediction(pred, m);
    pred.scoreAwarded = newScore;
    pred.isExact = isExact;
    pred.isOutcomeCorrect = isOut;
    pred.scoredAt = Date.now();
    
    user.totalScore = (user.totalScore || 0) + newScore;
    if (isExact) user.exactCount = (user.exactCount||0) + 1;
    else if (isOut) user.outcomeCount = (user.outcomeCount||0) + 1;
  });
  
  m.status = 'scored';
  m.scoredAt = Date.now();
  saveData('matches', matches);
  saveData('predictions', preds);
  saveData('users', users);
  showToast('✅ ניקוד חושב לכל המשתמשים!');
  switchAdminPanel('results');
};

window.recalcMatch = function(matchId) {
  // Reset scored status and recalculate
  const matches = loadData('matches',[]);
  const m = matches.find(x => x.id === matchId);
  if (!m) return;
  
  let preds = loadData('predictions',[]);
  let users = loadData('users',[]);
  
  // Remove old scores for this match
  preds.forEach(pred => {
    if (pred.matchId !== matchId) return;
    const user = users.find(u => u.id === pred.userId);
    if (!user) return;
    if (pred.isExact) user.exactCount = Math.max(0,(user.exactCount||0)-1);
    else if (pred.isOutcomeCorrect) user.outcomeCount = Math.max(0,(user.outcomeCount||0)-1);
    user.totalScore = Math.max(0,(user.totalScore||0) - (pred.scoreAwarded||0));
    pred.scoreAwarded = 0; pred.isExact = false; pred.isOutcomeCorrect = false;
  });
  
  m.status = 'finished';
  saveData('matches', matches); saveData('predictions', preds); saveData('users', users);
  
  setTimeout(() => calcMatch(matchId), 50);
};

window.calcAllMatches = function() {
  const matches = loadData('matches',[]);
  const finished = matches.filter(m => m.status==='finished' && m.actualHomeScore !== null);
  if (finished.length === 0) { showToast('אין משחקים שהסתיימו עם תוצאה'); return; }
  finished.forEach(m => {
    if (m.status !== 'scored') calcMatch(m.id);
  });
  showToast(`✅ ניקוד חושב עבור ${finished.length} משחקים`);
};

  if (!confirm('לאפס את הסיסמה? המשתמש יבחר סיסמה חדשה בהתחברות הבאה.')) return;

  if (idx === -1) { showToast('משתמש לא נמצא'); return; }
  users[idx].passwordHash = null;
  users[idx].passwordSetAt = null;

window.calcGroupBonuses = function() {
  const winners = loadData('actualGroupWinners', {});
  if (Object.keys(winners).length === 0) { showToast('לא הוגדרו מנצחות בתים'); return; }
  
  const specials = loadData('specialPredictions', {});
  let users = loadData('users', []);
  
  users.forEach(user => {
    const up = specials[user.id] || {};
    let bonus = 0;
    Object.entries(winners).forEach(([grp, winner]) => {
      if (up[`group_${grp}`] === winner) bonus += SCORING.groupWinner;
    });
    user.bonusScore = (user.bonusScore || 0) + bonus;
    user.totalScore = (user.totalScore || 0) + bonus;
  });
  
  saveData('users', users);
  showToast('✅ בונוסי מנצחות בתים חושבו!');

window.saveKOResult = function(id) {

  const a = parseInt(document.getElementById('kra_'+id)?.value);
  const adv = document.getElementById('kradv_'+id)?.value;
  if (isNaN(h)||isNaN(a)) { showToast('נא להזין תוצאה'); return; }
  let kms = loadData('knockoutMatches',[]);
  const m = kms.find(x => x.id===id);
  if (!m) return;
  m.actualHomeScore=h; m.actualAwayScore=a; m.actualWinner=getOutcome(h,a);
  m.advancingTeam=adv||null; m.status='finished';
  saveData('knockoutMatches',kms);
  showToast('✅ תוצאה נשמרה');
};

window.calcKOMatch = function(id) {
  const kms = loadData('knockoutMatches',[]);
  const m = kms.find(x => x.id===id);
  if (!m||m.actualHomeScore===null) { showToast('נא לשמור תוצאה קודם'); return; }
  
  let preds = loadData('knockoutPredictions',[]);
  let users = loadData('users',[]);
  
  preds.forEach(pred => {
    if (pred.matchId !== id) return;
    const user = users.find(u => u.id===pred.userId);
    if (!user) return;
    user.totalScore = Math.max(0,(user.totalScore||0)-(pred.scoreAwarded||0));
    
    const isExact = pred.predictedHomeScore===m.actualHomeScore && pred.predictedAwayScore===m.actualAwayScore;
    const isOut = getOutcome(pred.predictedHomeScore,pred.predictedAwayScore)===getOutcome(m.actualHomeScore,m.actualAwayScore);
    let s = 0;
    if (isExact) s = SCORING.knockoutExact;
    else if (isOut) s = SCORING.knockoutOutcome;
    if (!isExact && pred.predictedAdvancingTeam && pred.predictedAdvancingTeam===m.advancingTeam) s += SCORING.knockoutAdvancing;
    pred.scoreAwarded=s; pred.isExact=isExact; pred.isOutcomeCorrect=isOut;
    user.totalScore=(user.totalScore||0)+s;
    if (isExact) user.exactCount=(user.exactCount||0)+1;
  });
  
  const kmIdx = kms.findIndex(x=>x.id===id);
  kms[kmIdx].status='scored';
  saveData('knockoutMatches',kms); saveData('knockoutPredictions',preds); saveData('users',users);
  showToast('✅ ניקוד חושב');
  switchAdminPanel('knockout');
};
